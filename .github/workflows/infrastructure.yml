name: Infrastructure

# ── When does this run? ───────────────────────────────────────────
# 1. Manually from the GitHub Actions tab — choose dev, staging, or prod.
# 2. Automatically on push to main for Terraform/platform changes — defaults to dev.
on:
  push:
    branches: [main]
    paths:
      - 'Rideshare-IAC/**'
      - 'rideshare-k8s/platform/**'
      - 'rideshare-k8s/aws/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to provision"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev

env:
  AWS_REGION: eu-west-1
  # Falls back to 'dev' when triggered by a push (no input available)
  ENV_NAME: ${{ inputs.environment || 'dev' }}

jobs:
  # ── Job 1: Terraform ──────────────────────────────────────────────
  # Provisions AWS infrastructure via Terraform Cloud (Remote execution).
  # TF Cloud runs the plan/apply using workspace variables for secrets.
  # GitHub runner only handles pre-apply cleanup and kubectl steps.
  terraform:
    name: Provision Infrastructure (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rideshare-IAC

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Needed for the force-delete secrets pre-apply step (AWS CLI)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # TF_WORKSPACE tells Terraform CLI which tagged workspace to use.
      # TF Cloud then runs plan/apply remotely using that workspace's variables.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        env:
          TF_WORKSPACE: teleios-daniel-${{ env.ENV_NAME }}
        run: terraform init

      # ── Pre-apply: force-delete any secrets pending deletion ──────
      # If a previous destroy left secrets in a recovery window,
      # Terraform cannot recreate them. This step permanently deletes
      # any such secrets so apply can proceed cleanly.
      - name: Force-delete pending secrets
        run: |
          for SECRET in \
            daniel-database-url \
            daniel-jwt-secret-driver-and-rider \
            daniel-email-service \
            daniel-google-oauth \
            daniel-mapbox; do
            aws secretsmanager delete-secret \
              --secret-id "$SECRET" \
              --force-delete-without-recovery \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true
          done

      # TF Cloud runs the plan remotely using workspace variables.
      # No TF_VAR_* env vars needed here — they live in TF Cloud workspaces.
      - name: Terraform Plan
        env:
          TF_WORKSPACE: teleios-daniel-${{ env.ENV_NAME }}
        run: terraform plan -var-file=${{ env.ENV_NAME }}.tfvars -out=tfplan

      - name: Terraform Apply
        env:
          TF_WORKSPACE: teleios-daniel-${{ env.ENV_NAME }}
        run: terraform apply -auto-approve tfplan

  # ── Job 2: Platform Setup ─────────────────────────────────────────
  # Runs after Terraform. Applies Kubernetes manifests that depend on
  # Helm CRDs installed by Terraform (ExternalSecrets, ClusterIssuer, Ingress).
  platform-setup:
    name: Apply Platform Manifests (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name teleios-daniel-${{ env.ENV_NAME }}-eks

      # ── App Namespace ─────────────────────────────────────────────
      - name: Create App Namespace
        run: |
          kubectl create namespace rideshare-data \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Storage Classes
        run: kubectl apply -f rideshare-k8s/aws/storage-classes.yaml

      # ── Secrets ───────────────────────────────────────────────────
      - name: Apply Secret Store and External Secrets
        run: |
          kubectl apply -f rideshare-k8s/platform/secrets/secret-store.yaml
          kubectl apply -f rideshare-k8s/platform/secrets/external-secrets.yaml

      # ── TLS ───────────────────────────────────────────────────────
      - name: Apply Cluster Issuer
        run: |
          kubectl rollout status deployment/cert-manager-webhook \
            -n cert-manager --timeout=2m
          kubectl apply -f rideshare-k8s/platform/ingress/cluster-issuer.yaml

      # ── Ingress ───────────────────────────────────────────────────
      - name: Apply Ingress Rules
        run: |
          kubectl delete validatingwebhookconfiguration ingress-nginx-admission 2>/dev/null || true
          kubectl apply -f rideshare-k8s/platform/ingress/ingress.yaml
