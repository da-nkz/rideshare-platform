name: Build and Deploy Services

# ── When does this run? ───────────────────────────────────────────
# 1. After Infrastructure completes — forms the final link in the
#    push-to-deploy chain: Terraform → Platform Setup → Apps
# 2. Automatically when you push changes to any microservice directory
#    or its corresponding Kubernetes manifests. Only the changed
#    service(s) are built and deployed — not all six every time.
# 3. Manually from the GitHub Actions tab using "Run workflow".
on:
  workflow_run:
    workflows: ["Infrastructure"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'rideshare-driver-service/**'
      - 'rideshare-rider-service/**'
      - 'rideshare-trip-service/**'
      - 'rideshare-email-service/**'
      - 'rideshare-matching-service/**'
      - 'rideshare-frontend/**'
      - 'rideshare-k8s/applications/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 221693237976.dkr.ecr.eu-west-1.amazonaws.com
  # Falls back to 'dev' when triggered by push or workflow_run (no input available)
  ENV_NAME: ${{ inputs.environment || 'dev' }}

jobs:
  # ── Job 1: Detect Changes ─────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      driver:   ${{ steps.filter.outputs.driver }}
      rider:    ${{ steps.filter.outputs.rider }}
      trip:     ${{ steps.filter.outputs.trip }}
      email:    ${{ steps.filter.outputs.email }}
      matching: ${{ steps.filter.outputs.matching }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4

      - name: Check which services changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            driver:
              - 'rideshare-driver-service/**'
              - 'rideshare-k8s/applications/driver-service/**'
            rider:
              - 'rideshare-rider-service/**'
              - 'rideshare-k8s/applications/rider-service/**'
            trip:
              - 'rideshare-trip-service/**'
              - 'rideshare-k8s/applications/trip-service/**'
            email:
              - 'rideshare-email-service/**'
              - 'rideshare-k8s/applications/email-service/**'
            matching:
              - 'rideshare-matching-service/**'
              - 'rideshare-k8s/applications/matching-service/**'
            frontend:
              - 'rideshare-frontend/**'
              - 'rideshare-k8s/applications/frontend/**'

  # ── Job 2: Frontend (Next.js) ─────────────────────────────────────
  build-frontend:
    name: Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository
        run: |
          aws ecr create-repository \
            --repository-name daniel-rideshare-frontend \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Build and Push Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            --build-arg NEXT_PUBLIC_DRIVER_SERVICE_URL=https://daniel-resume.xyz \
            --build-arg NEXT_PUBLIC_RIDER_SERVICE_URL=https://daniel-resume.xyz \
            --build-arg NEXT_PUBLIC_TRIP_SERVICE_URL=https://daniel-resume.xyz \
            --build-arg NEXT_PUBLIC_TRIP_WS_URL=wss://daniel-resume.xyz \
            --build-arg NEXT_PUBLIC_WS_URL=wss://daniel-resume.xyz \
            --build-arg NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }} \
            -t ${{ env.ECR_REGISTRY }}/daniel-rideshare-frontend:$IMAGE_TAG \
            ./rideshare-frontend
          docker push ${{ env.ECR_REGISTRY }}/daniel-rideshare-frontend:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name teleios-daniel-${{ env.ENV_NAME }}-eks

      - name: Deploy to EKS
        run: |
          IMAGE_TAG=${{ github.sha }}
          kubectl apply -f rideshare-k8s/applications/frontend/configmap.yaml
          sed "s|daniel-rideshare-frontend:v[0-9]*|daniel-rideshare-frontend:$IMAGE_TAG|g" \
            rideshare-k8s/applications/frontend/deployment.yaml \
            | kubectl apply -f -
          kubectl apply -f rideshare-k8s/applications/frontend/hpa.yaml
          kubectl rollout status deployment/frontend-service \
            -n rideshare-data --timeout=10m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Pods ===" && kubectl get pods -n rideshare-data -l app=frontend-service
          echo "=== Describe ===" && kubectl describe pods -n rideshare-data -l app=frontend-service
          echo "=== Logs ===" && kubectl logs -n rideshare-data -l app=frontend-service --tail=50 || true

  # ── Job 3: Driver Service ─────────────────────────────────────────
  build-driver-service:
    name: Driver Service
    needs: [detect-changes, build-frontend]
    if: always() && (needs.detect-changes.outputs.driver == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository
        run: |
          aws ecr create-repository \
            --repository-name daniel-driver-service \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Build and Push Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -t ${{ env.ECR_REGISTRY }}/daniel-driver-service:$IMAGE_TAG \
            ./rideshare-driver-service
          docker push ${{ env.ECR_REGISTRY }}/daniel-driver-service:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name teleios-daniel-${{ env.ENV_NAME }}-eks

      - name: Deploy to EKS
        run: |
          IMAGE_TAG=${{ github.sha }}
          kubectl apply -f rideshare-k8s/applications/driver-service/configmap.yaml
          sed "s|daniel-driver-service:v[0-9]*|daniel-driver-service:$IMAGE_TAG|g" \
            rideshare-k8s/applications/driver-service/deployment.yaml \
            | kubectl apply -f -
          kubectl apply -f rideshare-k8s/applications/driver-service/hpa.yaml
          kubectl rollout status deployment/driver-service \
            -n rideshare-data --timeout=10m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Pods ===" && kubectl get pods -n rideshare-data -l app=driver-service
          echo "=== Describe ===" && kubectl describe pods -n rideshare-data -l app=driver-service
          echo "=== Logs ===" && kubectl logs -n rideshare-data -l app=driver-service --tail=50 || true

  # ── Job 4: Rider Service ──────────────────────────────────────────
  build-rider-service:
    name: Rider Service
    needs: [detect-changes, build-frontend]
    if: always() && (needs.detect-changes.outputs.rider == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository
        run: |
          aws ecr create-repository \
            --repository-name daniel-rider-service \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Build and Push Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -t ${{ env.ECR_REGISTRY }}/daniel-rider-service:$IMAGE_TAG \
            ./rideshare-rider-service
          docker push ${{ env.ECR_REGISTRY }}/daniel-rider-service:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name teleios-daniel-${{ env.ENV_NAME }}-eks

      - name: Deploy to EKS
        run: |
          IMAGE_TAG=${{ github.sha }}
          kubectl apply -f rideshare-k8s/applications/rider-service/configmap.yaml
          sed "s|daniel-rider-service:v[0-9]*|daniel-rider-service:$IMAGE_TAG|g" \
            rideshare-k8s/applications/rider-service/deployment.yaml \
            | kubectl apply -f -
          kubectl apply -f rideshare-k8s/applications/rider-service/hpa.yaml
          kubectl rollout status deployment/rider-service \
            -n rideshare-data --timeout=10m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Pods ===" && kubectl get pods -n rideshare-data -l app=rider-service
          echo "=== Describe ===" && kubectl describe pods -n rideshare-data -l app=rider-service
          echo "=== Logs ===" && kubectl logs -n rideshare-data -l app=rider-service --tail=50 || true

  # ── Job 5: Trip Service ───────────────────────────────────────────
  build-trip-service:
    name: Trip Service
    needs: [detect-changes, build-frontend]
    if: always() && (needs.detect-changes.outputs.trip == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository
        run: |
          aws ecr create-repository \
            --repository-name daniel-trip-service \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Build and Push Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -t ${{ env.ECR_REGISTRY }}/daniel-trip-service:$IMAGE_TAG \
            ./rideshare-trip-service
          docker push ${{ env.ECR_REGISTRY }}/daniel-trip-service:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name teleios-daniel-${{ env.ENV_NAME }}-eks

      - name: Deploy to EKS
        run: |
          IMAGE_TAG=${{ github.sha }}
          kubectl apply -f rideshare-k8s/applications/trip-service/configmap.yaml
          sed "s|daniel-trip-service:v[0-9]*|daniel-trip-service:$IMAGE_TAG|g" \
            rideshare-k8s/applications/trip-service/deployment.yaml \
            | kubectl apply -f -
          kubectl apply -f rideshare-k8s/applications/trip-service/hpa.yaml
          kubectl rollout status deployment/trip-service \
            -n rideshare-data --timeout=10m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Pods ===" && kubectl get pods -n rideshare-data -l app=trip-service
          echo "=== Describe ===" && kubectl describe pods -n rideshare-data -l app=trip-service
          echo "=== Logs ===" && kubectl logs -n rideshare-data -l app=trip-service --tail=50 || true

  # ── Job 6: Email Service ──────────────────────────────────────────
  build-email-service:
    name: Email Service
    needs: [detect-changes, build-frontend]
    if: always() && (needs.detect-changes.outputs.email == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository
        run: |
          aws ecr create-repository \
            --repository-name daniel-email-service \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Build and Push Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -t ${{ env.ECR_REGISTRY }}/daniel-email-service:$IMAGE_TAG \
            ./rideshare-email-service
          docker push ${{ env.ECR_REGISTRY }}/daniel-email-service:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name teleios-daniel-${{ env.ENV_NAME }}-eks

      - name: Deploy to EKS
        run: |
          IMAGE_TAG=${{ github.sha }}
          kubectl apply -f rideshare-k8s/applications/email-service/configmap.yaml
          sed "s|daniel-email-service:v[0-9]*|daniel-email-service:$IMAGE_TAG|g" \
            rideshare-k8s/applications/email-service/deployment.yaml \
            | kubectl apply -f -
          kubectl apply -f rideshare-k8s/applications/email-service/hpa.yaml
          kubectl rollout status deployment/email-service \
            -n rideshare-data --timeout=10m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Pods ===" && kubectl get pods -n rideshare-data -l app=email-service
          echo "=== Describe ===" && kubectl describe pods -n rideshare-data -l app=email-service
          echo "=== Logs ===" && kubectl logs -n rideshare-data -l app=email-service --tail=50 || true

  # ── Job 7: Matching Service (Go) ──────────────────────────────────
  build-matching-service:
    name: Matching Service
    needs: [detect-changes, build-frontend]
    if: always() && (needs.detect-changes.outputs.matching == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository
        run: |
          aws ecr create-repository \
            --repository-name daniel-rideshare-matching-service \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Build and Push Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -t ${{ env.ECR_REGISTRY }}/daniel-rideshare-matching-service:$IMAGE_TAG \
            ./rideshare-matching-service
          docker push ${{ env.ECR_REGISTRY }}/daniel-rideshare-matching-service:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name teleios-daniel-${{ env.ENV_NAME }}-eks

      - name: Deploy to EKS
        run: |
          IMAGE_TAG=${{ github.sha }}
          kubectl apply -f rideshare-k8s/applications/matching-service/configmap.yaml
          sed "s|daniel-rideshare-matching-service:v[0-9]*|daniel-rideshare-matching-service:$IMAGE_TAG|g" \
            rideshare-k8s/applications/matching-service/deployment.yaml \
            | kubectl apply -f -
          kubectl apply -f rideshare-k8s/applications/matching-service/hpa.yaml
          kubectl rollout status deployment/matching-service \
            -n rideshare-data --timeout=10m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Pods ===" && kubectl get pods -n rideshare-data -l app=matching-service
          echo "=== Describe ===" && kubectl describe pods -n rideshare-data -l app=matching-service
          echo "=== Logs ===" && kubectl logs -n rideshare-data -l app=matching-service --tail=50 || true

  # ── Job 8: Run Database Migrations ────────────────────────────────
  run-migrations:
    name: Run Database Migrations
    needs:
      - build-driver-service
      - build-rider-service
      - build-trip-service
      - build-email-service
      - build-matching-service
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name teleios-daniel-${{ env.ENV_NAME }}-eks

      - name: Wait for deployments to be ready
        run: |
          echo "Waiting for services to stabilise..."
          for svc in rider-service driver-service trip-service; do
            kubectl rollout status deployment/$svc -n rideshare-data --timeout=5m || true
          done

      - name: Migrate rider-service (only if table missing)
        run: |
          POD=$(kubectl get pod -n rideshare-data -l app=rider-service \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}')
          TABLE_EXISTS=$(kubectl exec $POD -n rideshare-data -- node -e \
            "process.env.NODE_TLS_REJECT_UNAUTHORIZED='0'; \
             const {Pool}=require('pg'); \
             const p=new Pool({connectionString:process.env.DATABASE_URL+'?sslmode=require'}); \
             p.query(\"SELECT 1 FROM information_schema.tables WHERE table_schema='rider_service' AND table_name='riders'\") \
              .then(r=>{console.log(r.rows.length>0?'exists':'missing');p.end()}) \
              .catch(()=>{console.log('missing');p.end()});" 2>/dev/null)
          if [ "$TABLE_EXISTS" = "missing" ]; then
            echo "Riders table missing — running migration on pod: $POD"
            kubectl exec $POD -n rideshare-data -- node /app/dist/migrations/createTable.js
          else
            echo "Riders table already exists — skipping migration"
          fi

      - name: Migrate driver-service (only if table missing)
        run: |
          POD=$(kubectl get pod -n rideshare-data -l app=driver-service \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}')
          TABLE_EXISTS=$(kubectl exec $POD -n rideshare-data -- node -e \
            "process.env.NODE_TLS_REJECT_UNAUTHORIZED='0'; \
             const {Pool}=require('pg'); \
             const p=new Pool({connectionString:process.env.DATABASE_URL+'?sslmode=require'}); \
             p.query(\"SELECT 1 FROM information_schema.tables WHERE table_schema='driver_service' AND table_name='drivers'\") \
              .then(r=>{console.log(r.rows.length>0?'exists':'missing');p.end()}) \
              .catch(()=>{console.log('missing');p.end()});" 2>/dev/null)
          if [ "$TABLE_EXISTS" = "missing" ]; then
            echo "Drivers table missing — running migration on pod: $POD"
            kubectl exec $POD -n rideshare-data -- node /app/dist/migrations/createTable.js
          else
            echo "Drivers table already exists — skipping migration"
          fi

      - name: Verify trip-service DB init (auto-migrates on startup)
        run: |
          POD=$(kubectl get pod -n rideshare-data -l app=trip-service \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}')
          echo "Trip-service auto-migrates on startup via run.py — pod: $POD"
          echo "Skipping manual migration for trip-service"
