name: Destroy Infrastructure

# ── Manual trigger only ───────────────────────────────────────────
# This workflow is never triggered automatically — it must be run
# manually from the GitHub Actions tab. A confirmation input is
# required to prevent accidental destruction.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm:
        description: "Type DESTROY to confirm"
        required: true

env:
  AWS_REGION: eu-west-1

jobs:
  destroy:
    name: Terraform Destroy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rideshare-IAC

    # Safety gate — workflow exits immediately if confirmation is wrong
    if: github.event.inputs.confirm == 'DESTROY'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        env:
          TF_WORKSPACE: teleios-daniel-${{ github.event.inputs.environment }}
        run: terraform init

      # ── Configure kubectl ──────────────────────────────────────────
      # Needed to manually delete cert-manager CRDs before destroy.
      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name teleios-daniel-${{ github.event.inputs.environment }}-eks 2>/dev/null || true

      # ── Delete cert-manager CRDs ───────────────────────────────────
      # cert-manager CRDs have helm.sh/resource-policy: keep so Helm
      # refuses to delete them, causing a context deadline exceeded
      # timeout during destroy. Deleting them manually first unblocks
      # the Helm uninstall step in Terraform.
      - name: Delete cert-manager CRDs
        run: |
          kubectl delete crd \
            challenges.acme.cert-manager.io \
            orders.acme.cert-manager.io \
            certificaterequests.cert-manager.io \
            certificates.cert-manager.io \
            clusterissuers.cert-manager.io \
            issuers.cert-manager.io \
            2>/dev/null || true

      # ── Remove Helm releases from Terraform state ──────────────────
      # Belt-and-suspenders: if CRD deletion wasn't enough, removing
      # these from state ensures Terraform skips Helm uninstalls
      # entirely and proceeds straight to deleting AWS resources.
      - name: Remove Helm releases from Terraform state
        env:
          TF_WORKSPACE: teleios-daniel-${{ github.event.inputs.environment }}
        run: |
          terraform state rm helm_release.cert_manager     2>/dev/null || true
          terraform state rm helm_release.ingress_nginx    2>/dev/null || true
          terraform state rm helm_release.external_secrets 2>/dev/null || true
          terraform state rm helm_release.external_dns     2>/dev/null || true

      # TF Cloud runs the destroy remotely using workspace variables.
      # No TF_VAR_* env vars needed here — they live in TF Cloud workspaces.
      - name: Terraform Destroy
        env:
          TF_WORKSPACE: teleios-daniel-${{ github.event.inputs.environment }}
        run: terraform destroy -var-file=${{ github.event.inputs.environment }}.tfvars -auto-approve

      - name: Confirm Destruction
        run: echo "✅ ${{ github.event.inputs.environment }} infrastructure destroyed successfully."
