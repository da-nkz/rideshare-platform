apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      # Ensure this matches the region where you created your AWS Secret!
      region: us-east-1 
      auth:
        jwt:
          serviceAccountRef:
            # This perfectly matches the ServiceAccount in your screenshot
            name: external-secrets-sa
            namespace: external-secrets