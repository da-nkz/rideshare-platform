# 1. Application Connection URLs (For Rider, Driver, Trip services)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rideshare-secrets-fetcher
  namespace: rideshare-data
spec:
  refreshInterval: "1h"
  secretStoreRef:
    # This points directly to the ClusterSecretStore we just made above
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    # This is the name of the local Kubernetes Secret it will generate
    name: rideshare-db-credentials 
    creationPolicy: Owner
  data:
    # 1. Fetching the Primary Database URL (For Writes)
    - secretKey: DATABASE_URL
      remoteRef:
        key: daniel-database-url
        property: DATABASE_URL
        
    # 2. Fetching the Read-Replica Database URL (For Reads)
    - secretKey: DATABASE_READ_URL
      remoteRef:
        key: daniel-database-url
        property: DATABASE_READ_URL
        
    # 3. Fetching the Redis Cluster URL
    - secretKey: REDIS_URL
      remoteRef:
        key: daniel-database-url
        property: REDIS_URL

    - secretKey: JWT_SECRET
      remoteRef:
        key: daniel-jwt-secret-driver-and-rider   # Points to your brand new AWS vault
        property: JWT_SECRET

    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: daniel-database-url
        property: REDIS_PASSWORD

---
# 2. Redis Initialization Secrets (For Redis Cluster StatefulSet)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-init-secrets
  namespace: rideshare-data  # Deployed in the database namespace
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: redis-secret-volume # This is what your Redis pods will read
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: daniel-database-url
        property: REDIS_PASSWORD

---
# 3. PostgreSQL Database Initialization Secrets (NEW)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-init-secrets
  namespace: rideshare-data  # Deployed in the database namespace
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: postgres-secret-volume # This is what your Postgres pods will read
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_ADMIN_USER
      remoteRef:
        key: daniel-database-url
        property: POSTGRES_ADMIN_USER
    - secretKey: POSTGRES_ADMIN_PASS
      remoteRef:
        key: daniel-database-url
        property: POSTGRES_ADMIN_PASS
    - secretKey: POSTGRES_REPL_USER
      remoteRef:
        key: daniel-database-url
        property: POSTGRES_REPL_USER
    - secretKey: POSTGRES_REPL_PASS
      remoteRef:
        key: daniel-database-url
        property: POSTGRES_REPL_PASS
---
# 4. Email Service Secrets
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: email-secrets-fetcher
  namespace: rideshare-data
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: email-app-credentials # The new local container for your email pod
    creationPolicy: Owner
  data:
    - secretKey: AZURE_EMAIL_CONNECTION_STRING
      remoteRef:
        key: daniel-email-service
        property: AZURE_EMAIL_CONNECTION_STRING
        
    - secretKey: SENDER_EMAIL
      remoteRef:
        key: daniel-email-service
        property: SENDER_EMAIL

