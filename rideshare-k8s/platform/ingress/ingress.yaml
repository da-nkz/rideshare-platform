apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rideshare-ingress
  namespace: rideshare-data
  annotations:
    kubernetes.io/ingress.className: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod" 
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - daniel-resume.xyz
      secretName: rideshare-tls-secret
  rules:
    - host: daniel-resume.xyz
      http:
        paths:
          # --- WEBSOCKETS ---
          - path: /ws(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: matching-service
                port:
                  number: 3004

          # --- BACKEND APIS (Correctly Pluralized!) ---
          - path: /api/v1/drivers(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: driver-service
                port:
                  number: 3003

          - path: /api/v1/riders(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: rider-service
                port:
                  number: 3001

          - path: /api/v1/trips(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trip-service
                port:
                  number: 3005

          - path: /api/v1/fares(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trip-service
                port:
                  number: 3005

          - path: /api/v1/matching(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: matching-service
                port:
                  number: 3004

          - path: /api/v1/email(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: email-service
                port:
                  number: 3002

          # --- FRONTEND CATCH-ALL ---
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000