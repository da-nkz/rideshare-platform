apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-service
  namespace: rideshare-data
spec:
  replicas: 2
  selector:
    matchLabels:
      app: matching-service
  template:
    metadata:
      labels:
        app: matching-service
    spec:
      containers:
        - name: matching-service
          image: 221693237976.dkr.ecr.eu-west-1.amazonaws.com/daniel-rideshare-matching-service:v1
          ports:
            - containerPort: 3004 
          
          # non-sensitive variables
          envFrom:
            - configMapRef:
                name: matching-service-config
          
          # existing secure database and redis URLs
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rideshare-db-credentials
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: rideshare-db-credentials
                  key: REDIS_URL
                  
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

---
# 2. The Internal Network Service
apiVersion: v1
kind: Service
metadata:
  name: matching-service
  namespace: rideshare-data
spec:
  selector:
    app: matching-service
  ports:
    - protocol: TCP
      port: 3004
      targetPort: 3004